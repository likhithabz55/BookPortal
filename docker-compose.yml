#version: "3"
services:
  book-portal-be:
    build:
      context: ./book-portal-be
    platform: linux/arm64
#    image: ./book-portal-be:latest
    container_name: "book-portal-be"
    depends_on:
      mysql:
        condition: service_healthy
    restart : always


  book-portal-fe:
    build: ./book-portal-fe
#    image: ./book-portal-fe:latest
    container_name: "book-portal-fe"
    depends_on:
      - book-portal-be
  proxy:
    build: ./nginx
#    image: ./book-portal-proxy:latest
    container_name: "book-portal-proxy"
    restart: always
    ports:
      - "80:80"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: book_portal
      MYSQL_USER: uqi
      MYSQL_PASSWORD: Deneme123..
    ports:
      - "3306:3306"
    volumes:
      - ./dbData:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppwd"]
      interval: 5s
      timeout: 5s
      retries: 10