name: AWS-EC2 Instance CD

on:
  workflow_run:
    workflows: ["Node.js CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  on-success:

    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: SSH and Deploy Docker Images
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            sudo docker-compose down
            docker pull --platform linux/arm64 ${{ secrets.DOCKER_HUB_USERNAME }}/book-portal-be:latest
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/book-portal-fe:latest
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/book-proxy:latest
            sudo docker-compose up -d
            sudo docker image prune -af
          # Comment for Send-Command
          comment: docker-compose.yml file re-pulls newer versions of book-portal images and runs them on the instance.
